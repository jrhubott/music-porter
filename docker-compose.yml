services:
  music-porter:
    build: .
    user: "1000:1000"  # jrhubott:jrhubott — avoid running as root
    # Host networking lets Bonjour/mDNS work for iOS companion app discovery.
    # To use bridge networking instead (no Bonjour), replace with:
    #   ports:
    #     - "5555:5555"
    network_mode: host
    volumes:
      # data/ contains config.yaml, cookies.txt, and music-porter.db.
      # Auto-created on first run; pre-populate data/cookies.txt if needed.
      - ./data:/app/data
      - ./music:/app/music
      - ./export:/app/export
      - ./logs:/app/logs
    restart: unless-stopped
    # Default: server mode with --behind-proxy (auth enabled, 0.0.0.0, Bonjour).
    # Containers typically sit behind a reverse proxy, so proxy header trust is on.
    command: ["server", "--behind-proxy"]
    # For web mode (no auth, local browser UI):
    #   command: ["web", "--host", "0.0.0.0", "--behind-proxy"]
    # For server without auth:
    #   command: ["server", "--no-auth", "--behind-proxy"]
    # For direct access (no reverse proxy):
    #   command: ["server"]

    # Limitations:
    # - Cookie refresh: No browser in container. Provide data/cookies.txt from host.
    # - USB sync: Not available in container. Use host CLI for USB operations.
