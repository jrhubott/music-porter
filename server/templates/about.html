{% extends "base.html" %}
{% block title %}About - Music Porter{% endblock title %}
{% block content %}
<h4 class="mb-4">About</h4>

<!-- Version Card -->
<div class="card mb-4">
  <div class="card-body text-center py-4">
    <h2 class="mb-1"><i class="bi bi-music-note-beamed"></i> Music Porter</h2>
    <div class="fs-4 text-info" id="versionDisplay">v...</div>
    <p class="text-muted mt-2 mb-0">Music playlist management and conversion tool</p>
  </div>
</div>

<!-- Release Notes -->
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="bi bi-journal-text"></i> Release Notes</span>
    <small class="text-muted" id="notesCount"></small>
  </div>
  <div class="card-body p-0">
    <div id="releaseNotes" style="max-height: 600px; overflow-y: auto; padding: 1rem;">
      <div class="text-center text-muted py-4">Loading...</div>
    </div>
  </div>
</div>

{% endblock content %}

{% block scripts %}
<script>
jsonFetch('/api/about')
  .then(data => {
    document.getElementById('versionDisplay').textContent = 'v' + data.version;

    const container = document.getElementById('releaseNotes');
    if (!data.release_notes) {
      container.innerHTML = '<div class="text-center text-muted py-4">No release notes available.</div>';
      return;
    }

    // Parse release notes into sections
    const lines = data.release_notes.split('\n');
    let html = '';
    let versionCount = 0;

    for (const line of lines) {
      const versionMatch = line.match(/^Version\s+(.+):$/);
      if (versionMatch) {
        versionCount++;
        html += `<h6 class="mt-3 mb-2 text-info"><i class="bi bi-tag"></i> Version ${versionMatch[1]}</h6>`;
      } else if (line.startsWith('\u2022 ')) {
        html += `<div class="ms-3 mb-1 small">\u2022 ${line.substring(2)}</div>`;
      } else if (line.trim() === '') {
        // skip blank lines
      } else {
        html += `<div class="ms-3 mb-1 small">${line}</div>`;
      }
    }

    container.innerHTML = html;
    document.getElementById('notesCount').textContent = versionCount + ' versions';
  })
  .catch(err => {
    document.getElementById('releaseNotes').innerHTML =
      '<div class="text-center text-danger py-4">Failed to load release notes.</div>';
  });
</script>
{% endblock scripts %}
