<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Music Porter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
    .toggle-visibility {
      cursor: pointer;
      border: none;
      background: none;
      color: #adb5bd;
    }
    .toggle-visibility:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card bg-dark border-secondary shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h4 class="mb-1"><i class="bi bi-music-note-beamed"></i> Music Porter</h4>
          <small class="text-muted">Enter your API key to continue</small>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2 small" role="alert">
          <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/login">
          <div class="mb-3">
            <label for="apiKey" class="form-label small text-muted">API Key</label>
            <div class="input-group">
              <input type="password" class="form-control" id="apiKey" name="api_key"
                     placeholder="Paste API key from server terminal" required autofocus>
              <button type="button" class="toggle-visibility input-group-text"
                      onclick="toggleKey()" title="Show/hide key">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">
      The API key is displayed in the server terminal at startup.
    </p>
  </div>
  <script>
    function toggleKey() {
      const input = document.getElementById('apiKey');
      const icon = document.getElementById('toggleIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
