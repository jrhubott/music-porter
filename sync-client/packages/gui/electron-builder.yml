appId: com.musicporter.sync
productName: Music Porter Sync
npmRebuild: false
directories:
  buildResources: build
  output: out
files:
  - dist/**/*
  - "!node_modules/**/*"
mac:
  target:
    - dmg
    - zip
  icon: build/icon.icns
  category: public.app-category.music
  hardenedRuntime: true
  artifactName: "MusicPorterSync-${version}-${arch}.${ext}"
win:
  target:
    - nsis
  artifactName: "MusicPorterSync-${version}-Setup.${ext}"
linux:
  target:
    - AppImage
    - deb
  category: Audio
