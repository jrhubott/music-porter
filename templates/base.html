<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Music Porter{% endblock title %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; }
    .sidebar { width: 220px; min-height: 100vh; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar .nav-link { color: #adb5bd; padding: .6rem 1rem; font-size: .9rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.08); }
    .sidebar .nav-link i { width: 1.4em; text-align: center; margin-right: .4rem; }
    .main-content { margin-left: 220px; padding: 1.5rem; }
    .log-panel { background: #1a1a2e; border-radius: .5rem; padding: 1rem; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: .8rem; max-height: 500px; overflow-y: auto; min-height: 200px; }
    .log-panel .log-line { white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
    .log-panel .log-INFO { color: #8ec8f0; }
    .log-panel .log-OK { color: #6ecb63; }
    .log-panel .log-WARN { color: #f0c75e; }
    .log-panel .log-ERROR { color: #e74c3c; }
    .log-panel .log-SKIP { color: #adb5bd; }
    .log-panel .log-DRY-RUN { color: #bb86fc; }
    .log-panel .log-VERBOSE { color: #888; }
    .badge-running { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
    .version-badge { font-size: .75rem; opacity: .6; }
    .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; }
    /* Progress bar */
    .sse-progress { margin-bottom: .75rem; display: none; }
    .sse-progress .progress { height: 1.4rem; background: #1a1a2e; border: 1px solid rgba(255,255,255,.1); }
    .sse-progress .progress-bar { transition: width .3s ease; font-size: .75rem; font-weight: 600; }
    .sse-progress .progress-info { display: flex; justify-content: space-between; font-size: .75rem; color: #adb5bd; margin-top: .25rem; }
    .progress-bar-striped-animate { background-size: 1rem 1rem; animation: progress-stripes 1s linear infinite; }
    @keyframes progress-stripes {
      from { background-position: 1rem 0; }
      to { background-position: 0 0; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar bg-dark border-end border-secondary d-flex flex-column">
    <div class="p-3 border-bottom border-secondary">
      <h6 class="mb-0 text-white"><i class="bi bi-music-note-beamed"></i> Music Porter</h6>
      <span class="version-badge" id="versionBadge">v...</span>
    </div>
    <nav class="nav flex-column mt-2">
      <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2"></i>Dashboard</a>
      <a class="nav-link {% if request.path == '/playlists' %}active{% endif %}" href="/playlists"><i class="bi bi-list-ul"></i>Playlists</a>
      <a class="nav-link {% if request.path == '/pipeline' %}active{% endif %}" href="/pipeline"><i class="bi bi-arrow-repeat"></i>Pipeline</a>
      <a class="nav-link {% if request.path == '/convert' %}active{% endif %}" href="/convert"><i class="bi bi-file-earmark-music"></i>Convert</a>
      <a class="nav-link {% if request.path == '/tags' %}active{% endif %}" href="/tags"><i class="bi bi-tags"></i>Tags</a>
      <a class="nav-link {% if request.path == '/cover-art' %}active{% endif %}" href="/cover-art"><i class="bi bi-image"></i>Cover Art</a>
      <a class="nav-link {% if request.path == '/usb' %}active{% endif %}" href="/usb"><i class="bi bi-usb-drive"></i>USB Sync</a>
      <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings"><i class="bi bi-gear"></i>Settings</a>
      <hr class="my-2 border-secondary mx-3">
      <a class="nav-link {% if request.path == '/operations' %}active{% endif %}" href="/operations"><i class="bi bi-activity"></i>Operations <span class="badge bg-primary badge-running d-none" id="opsBadge">0</span></a>
    </nav>
    <div class="mt-auto p-3 border-top border-secondary">
      <div class="d-flex align-items-center justify-content-between">
        <small class="text-muted">Profile</small>
        <a href="/settings" class="badge bg-info text-decoration-none" id="sidebarProfile">...</a>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    {% block content %}{% endblock content %}
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── Toast notifications ──
    function showToast(msg, type='info') {
      const colors = {info:'bg-primary', success:'bg-success', error:'bg-danger', warning:'bg-warning text-dark'};
      const html = `<div class="toast align-items-center ${colors[type]||colors.info} text-white border-0" role="alert">
        <div class="d-flex"><div class="toast-body">${msg}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
      const container = document.getElementById('toastContainer');
      container.insertAdjacentHTML('beforeend', html);
      const el = container.lastElementChild;
      const toast = new bootstrap.Toast(el, {delay: 4000});
      toast.show();
      el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    // ── Submit operation and start SSE ──
    function submitOperation(url, formData, logContainerId, onComplete) {
      const logPanel = document.getElementById(logContainerId);
      if (logPanel) logPanel.innerHTML = '';

      fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(formData),
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showToast(data.error, 'error');
          return;
        }
        if (data.task_id) {
          showToast('Operation started', 'info');
          startSSE(data.task_id, logContainerId, onComplete);
        }
      })
      .catch(err => showToast('Request failed: ' + err, 'error'));
    }

    // ── SSE log streaming with progress bar ──
    function _ensureProgressBar(panel) {
      // Insert progress bar container above the log panel if not already present
      let wrapper = panel.parentNode.querySelector('.sse-progress');
      if (!wrapper) {
        wrapper = document.createElement('div');
        wrapper.className = 'sse-progress';
        wrapper.innerHTML =
          '<div class="progress">' +
            '<div class="progress-bar bg-info" role="progressbar" style="width:0%"></div>' +
          '</div>' +
          '<div class="progress-info">' +
            '<span class="progress-stage"></span>' +
            '<span class="progress-detail"></span>' +
          '</div>';
        panel.parentNode.insertBefore(wrapper, panel);
      }
      return wrapper;
    }

    function startSSE(taskId, containerId, onComplete) {
      const panel = document.getElementById(containerId);
      if (!panel) return;
      panel.innerHTML = '';
      const progressEl = _ensureProgressBar(panel);
      progressEl.style.display = 'none';
      const source = new EventSource('/api/stream/' + taskId);

      source.onmessage = function(e) {
        const msg = JSON.parse(e.data);
        if (msg.type === 'progress') {
          progressEl.style.display = 'block';
          const bar = progressEl.querySelector('.progress-bar');
          const stage = progressEl.querySelector('.progress-stage');
          const detail = progressEl.querySelector('.progress-detail');
          if (msg.percent >= 0) {
            bar.style.width = msg.percent + '%';
            bar.textContent = msg.percent + '%';
            bar.classList.remove('progress-bar-striped-animate');
          } else {
            // Indeterminate state (total unknown)
            bar.style.width = '100%';
            bar.textContent = '';
            bar.classList.add('progress-bar-striped-animate');
          }
          stage.textContent = msg.stage || '';
          if (msg.total > 0) {
            detail.textContent = msg.current + ' / ' + msg.total;
          } else {
            detail.textContent = msg.current + ' files';
          }
        } else if (msg.type === 'log') {
          const line = document.createElement('div');
          line.className = 'log-line log-' + msg.level;
          line.textContent = msg.message;
          panel.appendChild(line);
          panel.scrollTop = panel.scrollHeight;
        } else if (msg.type === 'done') {
          source.close();
          progressEl.style.display = 'none';
          const line = document.createElement('div');
          line.className = 'log-line mt-2 fw-bold log-' + (msg.status === 'completed' ? 'OK' : 'ERROR');
          line.textContent = '--- ' + msg.status.toUpperCase() + ' ---';
          panel.appendChild(line);
          panel.scrollTop = panel.scrollHeight;
          if (msg.status === 'completed') showToast('Operation completed', 'success');
          else showToast('Operation ' + msg.status, 'error');
          if (onComplete) onComplete(msg);
          updateOpsBadge();
        }
      };

      source.onerror = function() {
        source.close();
        progressEl.style.display = 'none';
      };

      updateOpsBadge();
    }

    // ── Operations badge updater ──
    function updateOpsBadge() {
      fetch('/api/tasks').then(r=>r.json()).then(tasks => {
        const running = tasks.filter(t => t.status === 'running').length;
        const badge = document.getElementById('opsBadge');
        if (running > 0) { badge.textContent = running; badge.classList.remove('d-none'); }
        else { badge.classList.add('d-none'); }
      }).catch(()=>{});
    }

    // ── Version badge ──
    fetch('/api/status').then(r=>r.json()).then(d => {
      document.getElementById('versionBadge').textContent = 'v' + d.version;
      document.getElementById('sidebarProfile').textContent = d.profile;
    }).catch(()=>{});

    // Poll ops badge every 10s
    setInterval(updateOpsBadge, 10000);
    updateOpsBadge();
  </script>
  {% block scripts %}{% endblock scripts %}
</body>
</html>
