name: Release Sync Client

on:
  push:
    tags:
      - 'sync-client-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            os: macos
          - runner: windows-latest
            os: windows

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: sync-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sync-client/package-lock.json

      # ── Version injection ──

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/sync-client-v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Inject version into constants.ts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/export const VERSION = '.*'/export const VERSION = '${VERSION}'/" \
            packages/core/src/constants.ts
          rm -f packages/core/src/constants.ts.bak

      - name: Inject version into package.json files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for pkg in package.json packages/core/package.json packages/cli/package.json packages/gui/package.json; do
            sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "$pkg"
            rm -f "$pkg.bak"
          done

      # ── Build ──

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      # ── CLI standalone executables ──

      - name: Bundle CLI with esbuild
        shell: bash
        run: |
          npx esbuild packages/cli/dist/index.js \
            --bundle \
            --platform=node \
            --target=node22 \
            --format=cjs \
            --outfile=cli-bundle.cjs

      - name: Package CLI (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          npx @yao-pkg/pkg cli-bundle.cjs \
            --target node22-macos-arm64 \
            --output mporter-sync-macos-arm64
          npx @yao-pkg/pkg cli-bundle.cjs \
            --target node22-macos-x64 \
            --output mporter-sync-macos-x64

      - name: Package CLI (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          npx @yao-pkg/pkg cli-bundle.cjs \
            --target node22-win-x64 \
            --output mporter-sync-win-x64.exe

      # ── GUI installers ──

      - name: Resolve electron version
        id: electron
        shell: bash
        run: |
          ELECTRON_VER=$(node -e "console.log(require('electron/package.json').version)")
          echo "version=$ELECTRON_VER" >> "$GITHUB_OUTPUT"

      - name: Build GUI — macOS arm64
        if: matrix.os == 'macos'
        run: >-
          npx electron-builder --mac dmg zip --arm64
          --project packages/gui
          --publish never
          -c.electronVersion=${{ steps.electron.outputs.version }}

      - name: Build GUI — macOS x64
        if: matrix.os == 'macos'
        run: >-
          npx electron-builder --mac dmg zip --x64
          --project packages/gui
          --publish never
          -c.electronVersion=${{ steps.electron.outputs.version }}

      - name: Build GUI — Windows x64
        if: matrix.os == 'windows'
        run: >-
          npx electron-builder --win nsis --x64
          --project packages/gui
          --publish never
          -c.electronVersion=${{ steps.electron.outputs.version }}

      # ── Upload artifacts ──

      - name: Upload CLI artifacts (macOS)
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: |
            sync-client/mporter-sync-macos-arm64
            sync-client/mporter-sync-macos-x64

      - name: Upload CLI artifacts (Windows)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: sync-client/mporter-sync-win-x64.exe

      - name: Upload GUI artifacts (macOS)
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: gui-macos
          path: |
            sync-client/packages/gui/out/MusicPorterSync-*-arm64.dmg
            sync-client/packages/gui/out/MusicPorterSync-*-arm64.zip
            sync-client/packages/gui/out/MusicPorterSync-*-x64.dmg
            sync-client/packages/gui/out/MusicPorterSync-*-x64.zip

      - name: Upload GUI artifacts (Windows)
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: sync-client/packages/gui/out/MusicPorterSync-*-Setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/sync-client-v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sync Client v${{ steps.version.outputs.version }}"
          body: |
            ## Music Porter Sync Client v${{ steps.version.outputs.version }}

            ### CLI Tool

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `mporter-sync-macos-arm64` |
            | macOS (Intel) | `mporter-sync-macos-x64` |
            | Windows (x64) | `mporter-sync-win-x64.exe` |

            ### Desktop App (GUI)

            | Platform | Installer | Portable |
            |----------|-----------|----------|
            | macOS (Apple Silicon) | `MusicPorterSync-${{ steps.version.outputs.version }}-arm64.dmg` | `.zip` |
            | macOS (Intel) | `MusicPorterSync-${{ steps.version.outputs.version }}-x64.dmg` | `.zip` |
            | Windows (x64) | `MusicPorterSync-${{ steps.version.outputs.version }}-Setup.exe` | — |

            > **Note:** These binaries are not code-signed. macOS users may need to right-click > Open on first launch. Windows users may see a SmartScreen warning — click "More info" > "Run anyway".
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
